name: Release GUI Wallets

on:
  workflow_dispatch:
    inputs:
      version:
        description: "GUI version without v, for example 2.0.1"
        required: true
        type: string
      core_release:
        description: "Core release tag to bundle (default: latest published)"
        required: false
        type: string
        default: ""

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            platform: win
            core_pattern: "XEQM-core-*-windows-x86_64-*.zip"
            core_archive: zip
            artifact_glob: dist/electron/Packaged/*.exe

          - name: linux-x64
            runner: ubuntu-latest
            platform: linux
            core_pattern: "XEQM-core-*-ubuntu-24.04-x86_64-*.tar.gz"
            core_archive: tar.gz
            artifact_glob: dist/electron/Packaged/*.AppImage

          - name: macos-arm64
            runner: macos-15
            platform: mac
            core_pattern: "XEQM-core-*-macos-arm64-*.tar.gz"
            core_archive: tar.gz
            artifact_glob: dist/electron/Packaged/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building XEQM GUI version $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            libatspi2.0-0 \
            libuuid1 \
            libsecret-1-0 \
            libappindicator3-1 \
            libfuse2

      - name: Install npm dependencies
        run: npm ci

      - name: Stamp package version
        shell: bash
        run: |
          npm version "${{ steps.version.outputs.version }}" \
            --no-git-tag-version \
            --allow-same-version

      - name: Resolve core release tag
        id: core
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.core_release }}"
          if [ -z "$TAG" ]; then
            TAG="$(gh release view --repo EquilibriaHorizon/equilibria-core --json tagName --jq .tagName)"
          fi
          echo "Resolved core release tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download core binaries from release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf bin core-download
          mkdir -p bin core-download

          gh release download "${{ steps.core.outputs.tag }}" \
            --repo EquilibriaHorizon/equilibria-core \
            --pattern "${{ matrix.core_pattern }}" \
            --dir core-download

          echo "Downloaded:"
          ls -la core-download

          ARCHIVE="$(find core-download -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' \) | head -1)"
          if [ -z "$ARCHIVE" ]; then
            echo "FATAL: Could not locate core archive after download"
            exit 1
          fi

          mkdir -p core-extract
          if [ "${{ matrix.core_archive }}" = "zip" ]; then
            unzip -q "$ARCHIVE" -d core-extract
          else
            tar -xzf "$ARCHIVE" -C core-extract
          fi

          INNER="$(find core-extract -mindepth 1 -maxdepth 1 -type d | head -1)"
          if [ -z "$INNER" ]; then
            echo "FATAL: Core archive layout unexpected (no inner directory)"
            find core-extract | sort
            exit 1
          fi

          cp -av "$INNER/." bin/

          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x bin/xeqm-d bin/xeqm-rpc bin/xeqm-wallet || true
          fi

          echo "bin/ contents:"
          ls -la bin

      - name: Verify packaged binaries
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f bin/xeqm-rpc.exe
            test -f bin/xeqm-d.exe
            test -f bin/xeqm-wallet.exe
          else
            test -f bin/xeqm-rpc
            test -f bin/xeqm-d
            test -f bin/xeqm-wallet
          fi
          echo "All required binaries present in bin/"

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$MAC_CERTIFICATE_BASE64" ]; then
            echo "FATAL: MAC_CERTIFICATE_BASE64 secret is not set"
            exit 1
          fi

          if [ -z "$MAC_CERTIFICATE_PASSWORD" ]; then
            echo "FATAL: MAC_CERTIFICATE_PASSWORD secret is not set"
            exit 1
          fi

          echo "$MAC_CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import certificate.p12 \
            -k build.keychain \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k actions \
            build.keychain

          echo "Available signing identities:"
          security find-identity -v -p codesigning build.keychain

      - name: Sign embedded macOS XEQM binaries before packaging
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          IDENTITY="$(security find-identity -v -p codesigning build.keychain | awk -F '\"' '/Developer ID Application/ { print $2; exit }')"

          if [ -z "$IDENTITY" ]; then
            echo "FATAL: Could not find Developer ID Application signing identity"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          echo "Using signing identity: $IDENTITY"

          sign_one() {
            local file="$1"

            if [ ! -f "$file" ]; then
              echo "Skipping missing file: $file"
              return 0
            fi

            echo "Signing $file"
            chmod +x "$file"

            codesign \
              --force \
              --options runtime \
              --timestamp \
              --sign "$IDENTITY" \
              "$file"

            echo "Verifying $file"
            codesign --verify --verbose=4 "$file"
            codesign --display --verbose=4 "$file"
          }

          echo "Signing core binaries..."
          sign_one "bin/xeqm-d"
          sign_one "bin/xeqm-wallet"
          sign_one "bin/xeqm-rpc"

      - name: Build Electron package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: true
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build:${{ matrix.platform }}

      - name: Copy artifacts
        shell: bash
        run: |
          mkdir -p release-out
          cp -av ${{ matrix.artifact_glob }} release-out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XEQM-GUI-${{ matrix.name }}
          path: release-out/*
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: List release files
        run: |
          find release -type f -maxdepth 3 -print

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: XEQM GUI v${{ steps.version.outputs.version }}
          files: release/**/*
          fail_on_unmatched_files: false
          generate_release_notes: false
          draft: false
          prerelease: false
          body: |
            Official GUI wallet for **XEQMLabs (XEQM)**.

            For documentation and support: [t.me/XEQCommunity](https://t.me/XEQCommunity)

            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows x64 | `.exe` installer |
            | Linux x64 | `.AppImage` |
            | macOS Apple Silicon | `.dmg` |

            Each download has a `.sha256` companion file you can use to verify integrity before installing.

            ---

            ## Install instructions

            ### Windows

            1. Download `XEQM-GUI-${{ steps.version.outputs.version }}-win.exe`
            2. Create a dedicated folder for the wallet (e.g. `C:\XEQM`)
            3. Run the installer from that folder

            No additional dependencies required — installer is fully self-contained.

            ### Linux

            1. Download `XEQM-GUI-${{ steps.version.outputs.version }}-linux.AppImage`
            2. Install runtime dependencies (one-time):
               ```bash
               sudo apt-get update
               sudo apt-get install -y libboost-all-dev libsodium23 libfuse2t64 libzmq5 libzstd1
               ```
               On Ubuntu 22.04 and below, use `libfuse2` instead of `libfuse2t64`.
            3. Make the AppImage executable and run it:
               ```bash
               chmod +x XEQM-GUI-${{ steps.version.outputs.version }}-linux.AppImage
               ./XEQM-GUI-${{ steps.version.outputs.version }}-linux.AppImage
               ```
               Or right-click → Properties → enable "Allow executing file as program", then double-click.
            4. If it fails with a sandbox error, run with `--no-sandbox`:
               ```bash
               ./XEQM-GUI-${{ steps.version.outputs.version }}-linux.AppImage --no-sandbox
               ```

            ### macOS (Apple Silicon)

            1. Download `XEQM-GUI-${{ steps.version.outputs.version }}-mac.dmg`
            2. Open the .dmg and drag **XEQM GUI** to your Applications folder
            3. Double-click to launch

            The macOS build is codesigned and notarized — no Homebrew or library installs are needed. All required libraries are bundled inside the `.app`.

            **If the app won't open** — if you see "app is damaged" or "cannot be opened", run this once in Terminal:
            ```bash
            xattr -cr "/Applications/XEQM GUI.app"
            ```
            Then double-click again.

            ---

            ## Where things live

            | What | Location |
            |------|----------|
            | Wallet files | `wallets/<network>/` inside the app's install folder |
            | Configuration | `data/` inside the app's install folder |
            | Auto-backup target | configurable in **Network Settings → Wallet Backup Path** |

            ## ⚠️ Back up your seed and wallet files

            Back up your **25-word seed phrase** and store it somewhere safe before installing, reinstalling, or changing install location. **If you lose the seed, your funds cannot be recovered.**

            Wallet files are stored in the app's install folder. Reinstalling or installing to a different folder may overwrite them. We are not responsible for lost seeds, wallet files, or funds resulting from overwriting, reinstall, or user error.

            Use the in-app **Wallet Backup Path** (Network Settings) to mirror your wallet folder elsewhere. Keep your own off-machine backup of either that folder or your seed regardless.
