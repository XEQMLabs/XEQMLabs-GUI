name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Legacy binaries (v22) from EquilibriaCC
        run: |
          mkdir -p bin-legacy
          echo "=== Downloading Legacy v22.0.0 binaries ==="
          wget -q https://github.com/EquilibriaCC/Equilibria/releases/download/v22.0.0/build-depends-x86_64-linux.zip -O legacy.zip
          unzip -o legacy.zip
          for NAME in xeq-wallet-rpc wallet-rpc; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then
              cp "$F" ./bin-legacy/xeq-wallet-rpc
              break
            fi
          done
          for NAME in xeq-d daemon equilibriad; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then
              cp "$F" ./bin-legacy/xeq-d
              break
            fi
          done
          chmod +x bin-legacy/*
          echo "=== bin-legacy/ contents ==="
          ls -la bin-legacy/
          rm -f legacy.zip

      - name: Extract New Mainnet binaries from Docker
        run: |
          mkdir -p bin
          echo "=== Pulling Docker image ==="
          docker pull ghcr.io/equilibriahorizon/equilibria-node:latest
          docker create --name temp-extract ghcr.io/equilibriahorizon/equilibria-node:latest
          echo "=== Extracting binaries from /usr/local/bin/ ==="
          docker cp temp-extract:/usr/local/bin/xeq-wallet-rpc ./bin/
          docker cp temp-extract:/usr/local/bin/xeq-d ./bin/
          docker rm temp-extract
          chmod +x bin/*
          echo "=== bin/ contents ==="
          ls -la bin/

      - name: Verify binaries
        run: |
          echo "=== Checking bin-legacy/ ==="
          ls -la bin-legacy/
          if [ ! -f bin-legacy/xeq-wallet-rpc ]; then
            echo "FATAL: bin-legacy/xeq-wallet-rpc not found!"
            exit 1
          fi
          echo "=== Checking bin/ ==="
          ls -la bin/
          if [ ! -f bin/xeq-wallet-rpc ]; then
            echo "FATAL: bin/xeq-wallet-rpc not found!"
            exit 1
          fi
          echo "=== File types ==="
          file bin-legacy/* bin/*

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libuuid1 libsecret-1-0 libappindicator3-1

      - name: Build Linux
        run: npm run build:linux

      - name: List build output
        run: |
          echo "=== Build output ==="
          ls -lah dist/electron/Packaged/ 2>/dev/null || echo "Packaged dir not found"

      - name: Upload to release v1
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1
          files: |
            dist/electron/Packaged/*.AppImage
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
