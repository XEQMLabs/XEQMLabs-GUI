name: Release

# Push a v* tag to trigger all three platform builds and create a GitHub Release.
# Example: git tag v1.0.2 && git push origin v1.0.2

on:
  push:
    tags:
      - "v*"

jobs:
  # ─────────────────────────────────────────────────────────────
  # WINDOWS
  # New-mainnet binaries: prebuilt/windows-x64/ (committed to repo)
  # Legacy binaries:      downloaded from v22 GitHub release zip
  # ─────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy New Mainnet binaries from repo
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          if (Test-Path "prebuilt/windows-x64") {
            Get-ChildItem -Path "prebuilt/windows-x64" -File | ForEach-Object {
              Copy-Item $_.FullName -Destination "bin/"
              Write-Host "Copied: $($_.Name)"
            }
            Write-Host "=== bin/ contents ==="
            Get-ChildItem bin
          } else {
            Write-Host "WARNING: prebuilt/windows-x64 not found — bin/ will be empty"
            New-Item -Path "bin/.gitkeep" -ItemType File -Force
          }

      - name: Download Legacy Windows binaries (v22)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin-legacy | Out-Null
          Write-Host "=== Downloading Legacy v22.0.0 Windows binaries ==="
          Invoke-WebRequest -Uri "https://github.com/EquilibriaCC/Equilibria/releases/download/v22.0.0/build-depends-windows-x64.zip" -OutFile legacy.zip
          Expand-Archive -Path legacy.zip -DestinationPath legacy-extract -Force
          # zip contains bare names: wallet-rpc.exe, daemon.exe, wallet-cli.exe
          $walletRpc = Get-ChildItem -Path legacy-extract -Recurse | Where-Object { $_.Name -in @("xeq-wallet-rpc.exe","wallet-rpc.exe") } | Select-Object -First 1
          $daemon    = Get-ChildItem -Path legacy-extract -Recurse | Where-Object { $_.Name -in @("xeq-d.exe","daemon.exe") }             | Select-Object -First 1
          $walletCli = Get-ChildItem -Path legacy-extract -Recurse | Where-Object { $_.Name -in @("xeq-wallet-cli.exe","wallet-cli.exe") } | Select-Object -First 1
          if ($walletRpc) { Copy-Item $walletRpc.FullName -Destination "bin-legacy/xeq-wallet-rpc.exe"; Write-Host "Got xeq-wallet-rpc.exe" } else { Write-Host "WARN: wallet-rpc not found" }
          if ($daemon)    { Copy-Item $daemon.FullName    -Destination "bin-legacy/xeq-d.exe";           Write-Host "Got xeq-d.exe" }           else { Write-Host "WARN: daemon not found" }
          if ($walletCli) { Copy-Item $walletCli.FullName -Destination "bin-legacy/xeq-wallet-cli.exe"; Write-Host "Got xeq-wallet-cli.exe" }   else { Write-Host "WARN: wallet-cli not found" }
          Write-Host "=== bin-legacy/ contents ==="
          Get-ChildItem bin-legacy
          Remove-Item legacy.zip            -ErrorAction SilentlyContinue
          Remove-Item legacy-extract -Recurse -ErrorAction SilentlyContinue

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Stamp version from tag
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          npm version $VERSION --no-git-tag-version --allow-same-version
          Write-Host "Building version $VERSION"

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/electron/Packaged/*.exe
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # LINUX
  # New-mainnet binaries: Docker image (ghcr.io/equilibriahorizon/equilibria-node)
  # Legacy binaries:      downloaded from v22 GitHub release zip
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Legacy Linux binaries (v22)
        run: |
          mkdir -p bin-legacy
          echo "=== Downloading Legacy v22.0.0 Linux binaries ==="
          wget -q https://github.com/EquilibriaCC/Equilibria/releases/download/v22.0.0/build-depends-x86_64-linux.zip -O legacy.zip
          unzip -o legacy.zip
          for NAME in xeq-wallet-rpc wallet-rpc; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -path ./prebuilt -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then cp "$F" ./bin-legacy/xeq-wallet-rpc; echo "Got $NAME → xeq-wallet-rpc"; break; fi
          done
          for NAME in xeq-d daemon equilibriad; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -path ./prebuilt -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then cp "$F" ./bin-legacy/xeq-d; echo "Got $NAME → xeq-d"; break; fi
          done
          for NAME in xeq-wallet-cli wallet-cli; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -path ./prebuilt -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then cp "$F" ./bin-legacy/xeq-wallet-cli; echo "Got $NAME → xeq-wallet-cli"; break; fi
          done
          chmod +x bin-legacy/*
          echo "=== bin-legacy/ contents ==="
          ls -la bin-legacy/
          rm -f legacy.zip

      - name: Extract New Mainnet binaries from Docker
        run: |
          mkdir -p bin
          echo "=== Pulling Docker image ==="
          docker pull ghcr.io/equilibriahorizon/equilibria-node:latest
          docker create --name temp-extract ghcr.io/equilibriahorizon/equilibria-node:latest
          docker cp temp-extract:/usr/local/bin/xeq-wallet-rpc ./bin/
          docker cp temp-extract:/usr/local/bin/xeq-d ./bin/
          docker cp temp-extract:/usr/local/bin/xeq-wallet-cli ./bin/ 2>/dev/null && echo "Got xeq-wallet-cli" || echo "xeq-wallet-cli not in Docker image (skipping)"
          docker rm temp-extract
          chmod +x bin/*
          echo "=== bin/ contents ==="
          ls -la bin/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libuuid1 libsecret-1-0 libappindicator3-1

      - name: Stamp version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "Building version $VERSION"

      - name: Build Linux
        run: npm run build:linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/electron/Packaged/*.AppImage
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # MACOS
  # New-mainnet binaries: prebuilt/macos-arm64/ (committed to repo)
  # Legacy binaries:      downloaded from v22 GitHub release zip
  # ─────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Legacy macOS binaries (v22)
        run: |
          mkdir -p bin-legacy
          echo "=== Downloading Legacy v22.0.0 macOS arm64 binaries ==="
          curl -sL -o legacy.zip "https://github.com/EquilibriaCC/Equilibria/releases/download/v22.0.0/build-depends-macOS-arm64.zip"
          unzip -o legacy.zip
          for NAME in xeq-wallet-rpc wallet-rpc; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -path ./prebuilt -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then cp "$F" ./bin-legacy/xeq-wallet-rpc; echo "Got $NAME → xeq-wallet-rpc"; break; fi
          done
          for NAME in xeq-d daemon equilibriad; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -path ./prebuilt -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then cp "$F" ./bin-legacy/xeq-d; echo "Got $NAME → xeq-d"; break; fi
          done
          for NAME in xeq-wallet-cli wallet-cli; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -path ./prebuilt -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then cp "$F" ./bin-legacy/xeq-wallet-cli; echo "Got $NAME → xeq-wallet-cli"; break; fi
          done
          chmod +x bin-legacy/*
          echo "=== bin-legacy/ contents ==="
          ls -la bin-legacy/
          rm -f legacy.zip

      - name: Copy New Mainnet binaries from repo
        run: |
          mkdir -p bin
          cp -v prebuilt/macos-arm64/xeq-wallet-rpc prebuilt/macos-arm64/xeq-d bin/
          [ -f prebuilt/macos-arm64/xeq-wallet-cli ] && cp -v prebuilt/macos-arm64/xeq-wallet-cli bin/ || echo "xeq-wallet-cli not in prebuilt (skipping)"
          chmod +x bin/*
          echo "=== bin/ contents ==="
          ls -la bin/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Stamp version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "Building version $VERSION"

      - name: Build macOS
        run: npm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/electron/Packaged/*.dmg
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # RELEASE — runs after all builds, publishes even if one fails
  # ─────────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release/windows
        continue-on-error: true

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release/linux
        continue-on-error: true

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: release/mac
        continue-on-error: true

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: List release files
        run: find release -type f 2>/dev/null || echo "No files found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.dmg
          fail_on_unmatched_files: false
          generate_release_notes: false
          draft: false
          prerelease: false
          body: |
            # XEQ GUI v${{ steps.get_version.outputs.version }}
            Official GUI wallet for Equilibria (XEQ)

            ## Features
            - Multi-network support: Switch between Legacy Mainnet, Mainnet (Offline), and Testnet
            - Legacy Mainnet: Connect to working remote nodes (us/eu/asia.equilibriacc.com)
            - Offline wallet creation: Generate wallets and addresses before mainnet launch

            ## Networks
            - **Legacy Mainnet** — Live, original XEQ network with remote nodes
            - **Mainnet** — Offline, prepare wallets for new mainnet launch
            - **Testnet** — Local development and testing

            Please follow the Swap Guide for installation instructions:
            https://equilibria-network.gitbook.io/docs/documentation/guides/xeq-legacy-swap-mainnet

            ## Notes
            - Default network is Legacy Mainnet
            - Wallets are stored in the `wallets/` folder within the app directory (please see GUI for backup)
            - Config is stored in the `data/` folder within the app directory

            ## Important — Back up your seed and wallet files

            Back up your 25-word seed phrase and store it somewhere safe before installing, reinstalling, or changing install location. If you lose the seed, your funds cannot be recovered.

            Wallet files are stored in the app's install folder. Reinstalling or installing to a different folder can remove or overwrite that folder. We are not responsible for lost seeds, wallet files, or funds due to overwriting, reinstall, or user error.

            Use the in-app Wallet Backup path (in Network Settings) to see where wallet files are automatically copied; keep your own backup of that folder or your seed as well.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
