name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Legacy Windows binaries
        shell: pwsh
        run: |
          mkdir -p bin-legacy
          Write-Host "=== Downloading Legacy v22 Windows binaries ==="
          Invoke-WebRequest -Uri "https://github.com/EquilibriaCC/Equilibria/releases/download/v22.0.0/build-depends-windows-x86_64.zip" -OutFile legacy.zip
          Expand-Archive -Path legacy.zip -DestinationPath legacy-extract -Force
          Get-ChildItem -Path legacy-extract -Recurse -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
          $walletRpc = Get-ChildItem -Path legacy-extract -Recurse -Filter "xeq-wallet-rpc.exe" | Select-Object -First 1
          $daemon = Get-ChildItem -Path legacy-extract -Recurse -Filter "xeq-d.exe" | Select-Object -First 1
          if ($walletRpc) { Copy-Item $walletRpc.FullName -Destination "bin-legacy/xeq-wallet-rpc.exe" }
          if ($daemon) { Copy-Item $daemon.FullName -Destination "bin-legacy/xeq-d.exe" }
          Write-Host "=== bin-legacy contents ==="
          Get-ChildItem bin-legacy
          Remove-Item legacy.zip -ErrorAction SilentlyContinue
          Remove-Item legacy-extract -Recurse -ErrorAction SilentlyContinue

      - name: Setup bin directory placeholder
        shell: pwsh
        run: |
          mkdir -p bin
          New-Item -Path "bin/.gitkeep" -ItemType File -Force
          Write-Host "Note: New mainnet binaries not yet available for Windows"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/electron/Packaged/*.exe
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Legacy binaries (v22) from EquilibriaCC
        run: |
          mkdir -p bin-legacy
          echo "=== Downloading Legacy v22.0.0 binaries ==="
          wget -q https://github.com/EquilibriaCC/Equilibria/releases/download/v22.0.0/build-depends-x86_64-linux.zip -O legacy.zip
          unzip -o legacy.zip
          for NAME in xeq-wallet-rpc wallet-rpc; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then
              cp "$F" ./bin-legacy/xeq-wallet-rpc
              break
            fi
          done
          for NAME in xeq-d daemon equilibriad; do
            F=$(find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./bin -prune -o -type f -name "$NAME" -print | head -1)
            if [ -n "$F" ]; then
              cp "$F" ./bin-legacy/xeq-d
              break
            fi
          done
          chmod +x bin-legacy/*
          ls -la bin-legacy/
          rm -f legacy.zip

      - name: Extract New Mainnet binaries from Docker
        run: |
          mkdir -p bin
          echo "=== Pulling Docker image ==="
          docker pull ghcr.io/equilibriahorizon/equilibria-node:latest
          docker create --name temp-extract ghcr.io/equilibriahorizon/equilibria-node:latest
          docker cp temp-extract:/usr/local/bin/xeq-wallet-rpc ./bin/
          docker cp temp-extract:/usr/local/bin/xeq-d ./bin/
          docker rm temp-extract
          chmod +x bin/*
          ls -la bin/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libuuid1 libsecret-1-0 libappindicator3-1

      - name: Build Linux
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/electron/Packaged/*.AppImage
          retention-days: 30

  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release/windows
        continue-on-error: true

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release/linux
        continue-on-error: true

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: List release files
        run: |
          echo "=== All release files ==="
          find release -type f 2>/dev/null || echo "No files found"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/**/*.exe
            release/**/*.AppImage
          fail_on_unmatched_files: false
          generate_release_notes: false
          draft: false
          prerelease: false
          body: |
            ## XEQ GUI v${{ steps.get_version.outputs.version }}

            Official GUI wallet for Equilibria (XEQ).

            ### Downloads

            **Windows:**
            - `XEQ-GUI-*-win.exe` - Windows Installer

            **Linux:**
            - `XEQ-GUI-*-linux.AppImage` - Portable AppImage

            ### Networks
            - **Legacy Mainnet** - Live, original XEQ network
            - **Mainnet** - Offline, prepare for new mainnet launch
            - **Testnet** - Development and testing

            ### Notes
            - All data stored within app folder (portable)
            - Default network is Legacy Mainnet
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
